name: workflow-event

on: 
    push:
      paths-ignore:
        - '.github/workflows/01-building-blocks.yaml'
    workflow_dispatch: # here in workflow dispatch event requires manual triggering job inside github -> Actions
   
    
jobs:
    echo:
        runs-on: ubuntu-latest
        steps:
            - name: show trigger info
              run: "echo This Job been triggered by ${{github.actor}} event."